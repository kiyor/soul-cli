<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0f17">
<title>Weiran Server</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<style>
:root{
  --bg0:#0b0f17;--bg1:#0f1522;--bg2:#131b2c;
  --panel:#0f1626;--panel2:#0c1220;
  --border:#22304a;--border2:#1b2740;
  --text:#e6eefc;--muted:#a9b7d6;--muted2:#7e8fb6;
  --accent:#6aa1ff;--accent2:#8b5cf6;--pink:#ec4899;
  --good:#21c07a;--warn:#f59e0b;--bad:#ef4444;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --radius:14px;--radius2:12px;
  --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
  --sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
  --sidebar-w:280px;
  --topbar-h:52px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:
    radial-gradient(1200px 700px at 20% 0%,rgba(139,92,246,.10),transparent 60%),
    radial-gradient(1000px 600px at 90% 10%,rgba(236,72,153,.08),transparent 55%),
    var(--bg0);
  color:var(--text);font-family:var(--sans);
  -webkit-tap-highlight-color:transparent;
  padding-top:env(safe-area-inset-top,0);
}

/* ── Desktop layout ── */
.app{height:100%;display:grid;grid-template-rows:var(--topbar-h) 1fr;grid-template-columns:var(--sidebar-w) 1fr}

/* ── Top Bar ── */
.topbar{
  grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:8px 12px;
  border-bottom:1px solid rgba(255,255,255,.06);
  background:linear-gradient(180deg,rgba(15,21,34,.95),rgba(12,18,32,.90));
  backdrop-filter:blur(12px);z-index:20;
}
.menu-btn{
  display:none;appearance:none;border:none;background:none;color:var(--text);
  font-size:20px;padding:6px 8px;cursor:pointer;border-radius:8px;
}
.menu-btn:active{background:rgba(255,255,255,.08)}
.brand{display:flex;align-items:center;gap:8px;min-width:0}
.logo{
  width:28px;height:28px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(139,92,246,.95),rgba(236,72,153,.85));
  box-shadow:0 8px 20px rgba(139,92,246,.15);
  position:relative;overflow:hidden;display:grid;place-items:center;font-size:14px;
}
.logo::after{content:"";position:absolute;inset:-40%;background:linear-gradient(135deg,rgba(255,255,255,.35),transparent 55%);transform:rotate(25deg)}
.brand h1{font-size:13px;line-height:1.1;letter-spacing:.2px;font-weight:650;white-space:nowrap}
.brand .sub{display:block;font-size:10px;color:var(--muted2);margin-top:1px;font-weight:500}
.spacer{flex:1}

.chip{
  display:inline-flex;align-items:center;gap:6px;padding:6px 10px;
  border:1px solid rgba(255,255,255,.08);background:rgba(15,22,38,.75);
  border-radius:999px;user-select:none;white-space:nowrap;flex-shrink:0;
}
.statusdot{width:8px;height:8px;border-radius:999px;background:var(--bad);box-shadow:0 0 0 2px rgba(239,68,68,.18)}
.statusdot.ok{background:var(--good);box-shadow:0 0 0 2px rgba(33,192,122,.18)}
.statusdot.idle{background:var(--warn);box-shadow:0 0 0 2px rgba(245,158,11,.18)}
.chip .label{font-size:11px;color:var(--muted);font-weight:600}

.btn{
  appearance:none;border:1px solid rgba(255,255,255,.10);
  background:rgba(19,27,44,.72);color:var(--text);padding:9px 12px;
  border-radius:12px;cursor:pointer;font-weight:650;font-size:12px;
  box-shadow:0 6px 14px rgba(0,0,0,.20);
  transition:transform .06s ease,background .15s ease;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(135deg,rgba(139,92,246,.95),rgba(236,72,153,.75));border-color:rgba(255,255,255,.12)}
.btn.danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.30)}
.btn:disabled{opacity:.5;pointer-events:none}
.btn.mini{padding:7px 10px;font-size:11px;border-radius:10px;box-shadow:none;background:rgba(19,27,44,.58)}

/* ── Sidebar ── */
.sidebar{
  border-right:1px solid rgba(255,255,255,.06);
  background:rgba(12,18,32,.75);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;overflow:hidden;z-index:15;
}
.sidebar-header{
  padding:10px 12px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;
}
.sidebar-header h2{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;flex:1}
.session-list{flex:1;overflow-y:auto;padding:6px;-webkit-overflow-scrolling:touch}
.session-list::-webkit-scrollbar{width:4px}
.session-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:999px}

.session-item{
  padding:10px;border-radius:12px;cursor:pointer;
  border:1px solid transparent;margin-bottom:3px;
  transition:background .15s ease,border-color .15s ease;
  -webkit-tap-highlight-color:transparent;
}
.session-item:active{background:rgba(255,255,255,.06)}
.session-item.active{background:rgba(139,92,246,.10);border-color:rgba(139,92,246,.25)}
.session-item .si-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.session-item .si-name{font-size:12px;font-weight:650;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item .si-status{width:8px;height:8px;border-radius:999px;flex-shrink:0}
.session-item .si-status.running{background:var(--good);box-shadow:0 0 6px rgba(33,192,122,.4)}
.session-item .si-status.idle{background:var(--warn)}
.session-item .si-status.stopped,.session-item .si-status.error{background:var(--bad)}
.session-item .si-status.starting{background:var(--accent);animation:pulse .8s ease-in-out infinite}
.session-item .si-meta{font-size:10px;color:var(--muted2);font-family:var(--mono);display:flex;gap:6px}
.session-item .si-close{
  appearance:none;border:none;background:none;color:var(--muted2);
  cursor:pointer;font-size:16px;padding:4px 6px;border-radius:8px;
}
.session-item .si-close:active{color:var(--bad);background:rgba(239,68,68,.1)}

.empty-state{padding:20px 14px;text-align:center;color:var(--muted2);font-size:12px;line-height:1.6}

.history-item{
  padding:8px 10px;border-radius:10px;cursor:pointer;
  border:1px solid transparent;margin-bottom:2px;opacity:.55;
  transition:opacity .15s ease;-webkit-tap-highlight-color:transparent;
}
.history-item:active{opacity:1;background:rgba(255,255,255,.04)}
.history-item .hi-title{font-size:11px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.history-item .hi-meta{font-size:10px;color:var(--muted2);font-family:var(--mono);display:flex;gap:6px;flex-wrap:wrap}
.history-item .hi-summary{font-size:10px;color:var(--muted2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.search-input{
  width:100%;padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.08);
  background:rgba(15,22,38,.6);color:var(--text);font-size:13px;font-family:var(--sans);outline:none;
}
.search-input:focus{border-color:rgba(139,92,246,.3)}

/* ── Main Content ── */
.main{display:flex;flex-direction:column;overflow:hidden;position:relative}
.content{flex:1;overflow-y:auto;padding:12px 10px 12px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:999px}
.wrap{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:10px}

/* Welcome */
.welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:14px;color:var(--muted2);text-align:center;padding:32px 20px;
}
.welcome .wlogo{
  width:56px;height:56px;border-radius:18px;
  background:linear-gradient(135deg,rgba(139,92,246,.80),rgba(236,72,153,.60));
  display:grid;place-items:center;font-size:24px;
  box-shadow:0 16px 32px rgba(139,92,246,.12);
}
.welcome h2{font-size:17px;color:var(--text);font-weight:700}
.welcome p{font-size:13px;line-height:1.6;max-width:340px}

/* Messages */
.msg{border:1px solid rgba(255,255,255,.06);background:rgba(15,22,38,.65);border-radius:var(--radius);overflow:hidden}
.msg.user{border-color:rgba(106,161,255,.15);background:rgba(16,24,42,.65)}
.msg.ai{border-color:rgba(139,92,246,.12);background:rgba(14,18,34,.65)}
.msg.system-msg{border-color:rgba(33,192,122,.12);background:rgba(14,25,20,.60)}
.msg.error-msg{border-color:rgba(239,68,68,.20);background:rgba(30,14,14,.60)}
.msghead{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.12)}
.avatar{width:24px;height:24px;border-radius:8px;display:grid;place-items:center;font-weight:900;font-size:11px;border:1px solid rgba(255,255,255,.08);flex-shrink:0}
.avatar.user{background:linear-gradient(135deg,rgba(106,161,255,.25),rgba(106,161,255,.08));color:rgba(220,235,255,.95)}
.avatar.ai{background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(139,92,246,.08));color:rgba(238,230,255,.95)}
.avatar.sys{background:linear-gradient(135deg,rgba(33,192,122,.20),rgba(33,192,122,.06));color:rgba(200,255,230,.95)}
.who{display:flex;align-items:baseline;gap:6px;flex:1;min-width:0}
.who .name{font-size:12px;font-weight:750;color:rgba(230,238,252,.95)}
.who .meta{font-size:10px;color:var(--muted2);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.body{padding:10px 12px 12px;position:relative}
.copy-msg{position:absolute;top:6px;right:6px;opacity:0;transition:opacity .15s ease;z-index:3}
.body:hover .copy-msg,.body:active .copy-msg{opacity:1}
.copy-msg button{appearance:none;cursor:pointer;font-size:11px;font-weight:650;padding:5px 10px;border-radius:10px;color:var(--muted);border:1px solid rgba(255,255,255,.10);background:rgba(19,27,44,.85);user-select:none}

/* Markdown */
.md{font-size:14px;line-height:1.7;color:rgba(230,238,252,.92);overflow-wrap:anywhere}
.md p{margin:0 0 8px}.md p:last-child{margin-bottom:0}
.md h1,.md h2,.md h3{margin:12px 0 8px;line-height:1.3}
.md h1{font-size:17px}.md h2{font-size:16px}.md h3{font-size:15px}
.md a{color:rgba(139,92,246,.95);text-decoration:none}.md a:hover{text-decoration:underline}
.md ul,.md ol{margin:0 0 8px 18px;padding:0}.md li{margin:3px 0}
.md blockquote{margin:8px 0;padding:8px 10px;border-left:3px solid rgba(139,92,246,.45);background:rgba(139,92,246,.06);border-radius:10px;color:rgba(230,238,252,.85)}
.md blockquote>:last-child{margin-bottom:0}
.md hr{border:0;height:1px;background:rgba(255,255,255,.08);margin:10px 0}
.md table{width:100%;border-collapse:collapse;margin:8px 0 12px;border-radius:10px;border:1px solid rgba(255,255,255,.06);overflow:hidden}
.md th,.md td{border-bottom:1px solid rgba(255,255,255,.05);padding:6px 8px;font-size:12px;vertical-align:top}
.md th{color:rgba(230,238,252,.95);background:rgba(255,255,255,.04);font-weight:700;text-align:left}
.md tr:last-child td{border-bottom:0}
.md code{font-family:var(--mono);font-size:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);padding:1px 5px;border-radius:6px}
.md pre{position:relative;margin:8px 0 12px;background:rgba(7,10,16,.92);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:auto}
.md pre code{display:block;padding:12px;background:transparent;border:0;font-size:12px;line-height:1.55}
.code-actions{position:absolute;top:8px;right:8px;opacity:0;transition:opacity .15s ease;z-index:2}
.md pre:hover .code-actions{opacity:1}
.codebtn{appearance:none;cursor:pointer;font-size:11px;font-weight:700;padding:5px 8px;border-radius:8px;color:rgba(230,238,252,.85);border:1px solid rgba(255,255,255,.10);background:rgba(19,27,44,.75);user-select:none}

/* Tool blocks — collapsible on mobile */
.tool-block{margin:8px 0;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(10,14,22,.90),rgba(7,10,16,.90));overflow:hidden}
.tool-block .tool-head{
  display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);
}
.tool-badge{
  display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;
  padding:3px 7px;border-radius:999px;border:1px solid rgba(139,92,246,.20);
  background:rgba(139,92,246,.08);color:rgba(200,180,255,.90);
}
.tool-badge .icon{font-size:11px}
.tool-block .tool-body{
  font-family:var(--mono);font-size:11px;line-height:1.5;padding:8px 10px;
  color:rgba(230,238,252,.80);overflow:auto;white-space:pre-wrap;word-break:break-all;
  max-height:200px;transition:max-height .2s ease;
}
.tool-block.collapsed .tool-body{max-height:0;padding:0 10px;overflow:hidden}
.tool-chevron{margin-left:auto;color:var(--muted2);font-size:12px;transition:transform .2s}
.tool-block.collapsed .tool-chevron{transform:rotate(-90deg)}

/* Streaming cursor */
.streaming .md::after{content:'';display:inline-block;width:2px;height:14px;background:var(--accent2);margin-left:2px;vertical-align:text-bottom;animation:blink .8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Composer ── */
.composer{
  border-top:1px solid rgba(255,255,255,.06);
  background:linear-gradient(180deg,rgba(12,18,32,.85),rgba(12,18,32,.95));
  backdrop-filter:blur(12px);padding:10px 10px calc(10px + var(--safe-b));
}
.composer.disabled{opacity:.4;pointer-events:none}
.composer .inner{max-width:900px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
.inputwrap{
  flex:1;border-radius:16px;border:1px solid rgba(255,255,255,.10);
  background:rgba(15,22,38,.75);overflow:hidden;display:flex;flex-direction:column;
}
.inputwrap:focus-within{border-color:rgba(139,92,246,.35);box-shadow:0 0 0 2px rgba(139,92,246,.10)}
.hintrow{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.05);color:rgba(169,183,214,.80);font-size:10px;user-select:none}
.kbd{font-family:var(--mono);border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.15);padding:1px 5px;border-radius:6px;color:rgba(230,238,252,.85);font-weight:700;font-size:10px}
textarea{width:100%;resize:none;border:0;outline:none;padding:10px 12px;background:transparent;color:rgba(230,238,252,.95);font-size:15px;line-height:1.5;font-family:var(--sans);max-height:160px;min-height:44px}
textarea::placeholder{color:rgba(126,143,182,.75)}

/* ── Modal ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.60);backdrop-filter:blur(4px);
  z-index:100;place-items:center;
}
.modal-overlay.show{display:grid}
.modal{
  background:var(--bg2);border:1px solid rgba(255,255,255,.10);border-radius:20px;
  box-shadow:0 30px 60px rgba(0,0,0,.5);padding:20px;width:420px;max-width:92vw;
}
.modal h2{font-size:15px;font-weight:750;margin-bottom:14px}
.modal label{display:block;font-size:12px;font-weight:650;color:var(--muted);margin-bottom:5px}
.modal input{
  width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.10);
  background:rgba(15,22,38,.75);color:var(--text);font-size:14px;font-family:var(--sans);
  outline:none;margin-bottom:12px;
}
.modal input:focus{border-color:rgba(139,92,246,.35)}
.modal .toggle{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px;color:var(--muted)}
.modal .toggle input{width:auto;margin:0}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px}

/* ── Mobile ── */
@media(max-width:768px){
  :root{--topbar-h:48px}
  .app{grid-template-columns:1fr}
  .menu-btn{display:block}
  .brand{min-width:0}
  .brand h1{font-size:12px}
  #session-chip{display:none !important}
  .chip:not(#session-chip){padding:5px 8px}
  .chip .label{font-size:10px}

  .sidebar{
    display:none;position:fixed;top:var(--topbar-h);left:0;right:0;bottom:0;
    width:100%;border-right:none;z-index:50;
    background:rgba(11,15,23,.97);backdrop-filter:blur(16px);
  }
  .sidebar.open{display:flex}

  .content{padding:10px 8px}
  .wrap{gap:8px}
  .msg{border-radius:12px}
  .msghead{padding:7px 10px}
  .body{padding:8px 10px 10px}
  .md{font-size:14px;line-height:1.65}
  .tool-block .tool-body{font-size:11px;max-height:120px}
  .tool-block.collapsed .tool-body{max-height:0}

  .hintrow{display:none}
  textarea{font-size:16px;min-height:40px;padding:10px 12px}
  .composer{padding:8px 8px calc(8px + var(--safe-b))}
  .composer .inner{gap:8px}
  .btn.primary#send-btn{padding:10px 16px;font-size:13px}

  .modal{border-radius:20px 20px 0 0;position:fixed;bottom:0;left:0;right:0;width:100%;max-width:100%;
    max-height:85vh;overflow-y:auto;border-bottom:none;
    padding-bottom:calc(20px + var(--safe-b));
  }
  .modal-overlay.show{align-items:flex-end}

  .welcome .wlogo{width:48px;height:48px;font-size:20px;border-radius:14px}
  .welcome h2{font-size:16px}
  .welcome p{font-size:12px}
}

/* ── Overlay backdrop for sidebar on mobile ── */
.sidebar-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;
}
.sidebar-backdrop.show{display:block}
</style>
</head>
<body>

<div class="app">
  <!-- Top Bar -->
  <div class="topbar">
    <button class="menu-btn" id="menu-btn" onclick="toggleSidebar()">&#9776;</button>
    <div class="brand">
      <div class="logo">W</div>
      <h1>Weiran Server<span class="sub" id="version"></span></h1>
    </div>
    <div class="chip" id="session-chip" style="display:none">
      <div class="statusdot" id="session-dot"></div>
      <span class="label" id="session-label"></span>
    </div>
    <div class="spacer"></div>
    <div class="chip">
      <span class="label" id="session-count">0</span>
    </div>
  </div>

  <!-- Sidebar backdrop (mobile) -->
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Active</h2>
      <button class="btn mini primary" onclick="showNewModal()">+ New</button>
    </div>
    <div class="session-list" id="session-list">
      <div class="empty-state" id="empty-state">No active sessions.<br>Tap <b>+ New</b> to create one.</div>
    </div>
    <div class="sidebar-header" style="border-top:1px solid rgba(255,255,255,.06)">
      <h2>History</h2>
    </div>
    <div style="padding:4px 8px 6px">
      <input id="history-search" class="search-input" type="text" placeholder="Search sessions...">
    </div>
    <div class="session-list" id="history-list" style="flex:2"></div>
  </div>

  <!-- Main -->
  <div class="main" id="main">
    <div class="content" id="content">
      <div class="welcome" id="welcome">
        <div class="wlogo">W</div>
        <h2>Weiran Server</h2>
        <p>Persistent Claude Code sessions.<br>Create a session to start.</p>
      </div>
      <div class="wrap" id="messages" style="display:none"></div>
    </div>
    <div class="composer disabled" id="composer">
      <div class="inner">
        <div class="inputwrap">
          <div class="hintrow"><span class="kbd">Shift+Enter</span> send</div>
          <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
        </div>
        <button class="btn primary" id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- New Session Modal -->
<div class="modal-overlay" id="new-modal" onclick="if(event.target===this)hideNewModal()">
  <div class="modal">
    <h2>Create Session</h2>
    <label>Name</label>
    <input id="m-name" placeholder="e.g. fix-nginx-config">
    <label>Project directory</label>
    <input id="m-project" placeholder="Leave empty for default workspace">
    <label>Model</label>
    <input id="m-model" placeholder="e.g. opus, sonnet (empty = default)">
    <label>Initial message</label>
    <input id="m-initial" placeholder="Optional: first message to send">
    <div class="toggle">
      <input type="checkbox" id="m-soul" checked>
      <span>Enable soul files (personality, memory)</span>
    </div>
    <div class="actions">
      <button class="btn" onclick="hideNewModal()">Cancel</button>
      <button class="btn primary" onclick="createSession()">Create</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/go.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/yaml.min.js"></script>
<script>
// ── State ──
let TOKEN = new URLSearchParams(location.search).get('token')||localStorage.getItem('weiran_token')||'';
try{['bash','go','javascript','python','json','yaml'].forEach(l=>{if(hljs.getLanguage(l))hljs.registerLanguage(l,hljs.getLanguage(l))})}catch(e){}

let activeSessionId=null, eventSource=null, sessions={}, streamingMsgEl=null, streamingText='';
let agentDisplayName='Weiran', agentAvatar='W';
const isMobile=window.matchMedia('(max-width:768px)').matches;

// ── Auth ──
function headers(x={}){return Object.assign({'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},x)}
async function api(path,opts={}){opts.headers=headers();const r=await fetch('/api'+path,opts);return r.json()}

// ── Init ──
window.addEventListener('load',async()=>{
  if(!TOKEN){
    const t=prompt('Enter server token:');
    if(t){localStorage.setItem('weiran_token',t);location.search='?token='+t;}
    return;
  }
  localStorage.setItem('weiran_token',TOKEN);
  // Clean URL
  if(location.search.includes('token='))history.replaceState(null,'',location.pathname);

  try{
    const h=await api('/health');
    document.getElementById('version').textContent=h.version||'';
    if(h.agent_name){
      agentDisplayName=h.agent_name;
      agentAvatar=h.agent_name.charAt(0).toUpperCase();
      document.querySelector('.brand h1').childNodes[0].textContent=h.agent_name+' Server';
      document.querySelectorAll('.wlogo,.logo').forEach(el=>el.textContent=agentAvatar);
      document.querySelector('.welcome h2').textContent=h.agent_name+' Server';
      document.title=h.agent_name+' Server';
    }
  }catch(e){}

  await refreshSessions();
  setInterval(refreshSessions,5000);
  await loadHistory();

  let st=null;
  document.getElementById('history-search').addEventListener('input',function(){
    clearTimeout(st);st=setTimeout(()=>renderHistory(this.value),150);
  });
});

// ── Sidebar (mobile) ──
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const bd=document.getElementById('sidebar-backdrop');
  const open=sb.classList.toggle('open');
  bd.classList.toggle('show',open);
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('show');
}

// ── Session List ──
async function refreshSessions(){
  try{
    const list=await api('/sessions');
    const listEl=document.getElementById('session-list');
    const emptyEl=document.getElementById('empty-state');
    document.getElementById('session-count').textContent=(list||[]).length+' active';

    const newIds=new Set();
    (list||[]).forEach(s=>{sessions[s.id]=s;newIds.add(s.id)});
    Object.keys(sessions).forEach(id=>{if(!newIds.has(id)){delete sessions[id];if(activeSessionId===id)selectSession(null)}});

    if(!list||list.length===0){emptyEl.style.display='';listEl.querySelectorAll('.session-item').forEach(el=>el.remove());return}
    emptyEl.style.display='none';

    const existing=new Map();
    listEl.querySelectorAll('.session-item').forEach(el=>existing.set(el.dataset.id,el));

    list.forEach(s=>{
      let el=existing.get(s.id);
      if(!el){el=document.createElement('div');el.className='session-item';el.dataset.id=s.id;el.onclick=()=>{selectSession(s.id);if(isMobile)closeSidebar()};listEl.appendChild(el)}
      el.classList.toggle('active',s.id===activeSessionId);
      el.innerHTML=`<div class="si-top"><span class="si-name">${esc(s.name||shortId(s.id))}</span><button class="si-close" onclick="event.stopPropagation();destroySession('${s.id}')">&times;</button><span class="si-status ${s.status}"></span></div><div class="si-meta"><span>${s.model||'default'}</span><span>${s.status}</span><span>${s.num_turns||0}t</span></div>`;
    });
    existing.forEach((el,id)=>{if(!newIds.has(id))el.remove()});
    updateSessionChip();
  }catch(e){}
}

function updateSessionChip(){
  const chip=document.getElementById('session-chip');
  const dot=document.getElementById('session-dot');
  const label=document.getElementById('session-label');
  if(!activeSessionId||!sessions[activeSessionId]){chip.style.display='none';return}
  const s=sessions[activeSessionId];
  chip.style.display='';
  dot.className='statusdot'+(s.status==='running'?' ok':s.status==='idle'?' idle':'');
  label.textContent=s.name||shortId(s.id);
}

// ── Session Selection ──
function selectSession(id){
  if(activeSessionId===id)return;
  if(eventSource){eventSource.close();eventSource=null}
  streamingMsgEl=null;streamingText='';
  activeSessionId=id;
  const w=document.getElementById('welcome'),m=document.getElementById('messages'),c=document.getElementById('composer');
  if(!id){w.style.display='';m.style.display='none';c.classList.add('disabled');updateSessionChip();refreshSessions();return}
  w.style.display='none';m.style.display='flex';m.innerHTML='';c.classList.remove('disabled');
  connectSSE(id);updateSessionChip();refreshSessions();
}

// ── SSE ──
function connectSSE(id){
  if(eventSource)eventSource.close();
  eventSource=new EventSource(`/api/sessions/${id}/stream?token=${encodeURIComponent(TOKEN)}`);
  eventSource.addEventListener('init',e=>{const d=JSON.parse(e.data);addSystemMsg(`Model: ${d.model||'?'}, ${(d.tools||[]).length} tools`)});
  eventSource.addEventListener('assistant',e=>handleAssistant(JSON.parse(e.data)));
  eventSource.addEventListener('tool_use',e=>handleToolUse(JSON.parse(e.data)));
  eventSource.addEventListener('tool_result',e=>handleToolResult(JSON.parse(e.data)));
  eventSource.addEventListener('result',e=>{
    finalizeStream();const d=JSON.parse(e.data);
    if(d.is_error)addErrorMsg(d.result||'error');
    if(sessions[id]){sessions[id].status=d.subtype==='error'?'error':'idle'}
    refreshSessions();
  });
  eventSource.addEventListener('system',e=>{const d=JSON.parse(e.data);addSystemMsg(d.subtype||'event')});
  eventSource.addEventListener('close',e=>{finalizeStream();addSystemMsg('Session ended.');document.getElementById('composer').classList.add('disabled')});
  eventSource.onerror=()=>{if(!sessions[activeSessionId]){eventSource.close();eventSource=null}};
}

// ── Messages ──
function handleAssistant(data){
  const msg=data.message;if(!msg||!msg.content)return;
  let text='';msg.content.forEach(b=>{if(b.type==='text')text+=b.text});
  if(!text)return;
  if(streamingMsgEl){streamingText+=text;const el=streamingMsgEl.querySelector('.md');if(el)el.innerHTML=renderMd(streamingText)}
  else{streamingText=text;streamingMsgEl=addAIMsg(text,true)}
  scrollBottom();
}
function handleToolUse(data){
  finalizeStream();const msg=data.message;if(!msg||!msg.content)return;
  msg.content.forEach(b=>{if(b.type==='tool_use')addToolUseMsg(b.name,b.input)});
}
function handleToolResult(data){
  const msg=data.message;if(!msg||!msg.content)return;
  msg.content.forEach(b=>{if(b.type==='tool_result'){const t=typeof b.content==='string'?b.content:JSON.stringify(b.content);addToolResultMsg(t)}});
}
function finalizeStream(){
  if(!streamingMsgEl)return;
  streamingMsgEl.classList.remove('streaming');
  streamingMsgEl.querySelectorAll('pre code').forEach(el=>{try{hljs.highlightElement(el)}catch(e){}});
  streamingMsgEl=null;streamingText='';
}

function addUserMsg(text){document.getElementById('messages').appendChild(createMsg('user','U','You',text));scrollBottom()}
function addAIMsg(text,streaming=false){const el=createMsg('ai',agentAvatar,agentDisplayName,text);if(streaming)el.classList.add('streaming');document.getElementById('messages').appendChild(el);scrollBottom();return el}
function addSystemMsg(text){
  const el=document.createElement('div');el.className='msg system-msg';
  el.innerHTML=`<div class="msghead"><div class="avatar sys">S</div><div class="who"><span class="name">System</span><span class="meta">${timeStr()}</span></div></div><div class="body"><div class="md">${esc(text)}</div></div>`;
  document.getElementById('messages').appendChild(el);scrollBottom();
}
function addErrorMsg(text){
  const el=document.createElement('div');el.className='msg error-msg';
  el.innerHTML=`<div class="msghead"><div class="avatar" style="background:rgba(239,68,68,.15);color:rgba(255,180,180,.9)">!</div><div class="who"><span class="name" style="color:var(--bad)">Error</span><span class="meta">${timeStr()}</span></div></div><div class="body"><div class="md">${esc(text)}</div></div>`;
  document.getElementById('messages').appendChild(el);scrollBottom();
}
function addToolUseMsg(name,input){
  const s=typeof input==='string'?input:JSON.stringify(input,null,2);
  const el=document.createElement('div');el.className='msg ai';
  const collapsed=isMobile?' collapsed':'';
  el.innerHTML=`<div class="tool-block${collapsed}"><div class="tool-head" onclick="this.parentElement.classList.toggle('collapsed')"><span class="tool-badge"><span class="icon">&#9889;</span>${esc(name)}</span><span class="tool-chevron">&#9662;</span></div><div class="tool-body">${esc(s)}</div></div>`;
  document.getElementById('messages').appendChild(el);scrollBottom();
}
function addToolResultMsg(text){
  const t=text.length>2000?text.slice(0,2000)+'...':text;
  const el=document.createElement('div');el.className='msg system-msg';
  const collapsed=isMobile?' collapsed':'';
  el.innerHTML=`<div class="tool-block${collapsed}"><div class="tool-head" onclick="this.parentElement.classList.toggle('collapsed')"><span class="tool-badge" style="border-color:rgba(33,192,122,.20);background:rgba(33,192,122,.08);color:rgba(180,255,220,.9)"><span class="icon">&#10003;</span>Result</span><span class="tool-chevron">&#9662;</span></div><div class="tool-body">${esc(t)}</div></div>`;
  document.getElementById('messages').appendChild(el);scrollBottom();
}

function createMsg(type,av,name,text){
  const el=document.createElement('div');el.className='msg '+type;
  el.innerHTML=`<div class="msghead"><div class="avatar ${type}">${av}</div><div class="who"><span class="name">${esc(name)}</span><span class="meta">${timeStr()}</span></div></div><div class="body"><div class="copy-msg"><button onclick="copyText(this)">Copy</button></div><div class="md">${type==='user'?esc(text):renderMd(text)}</div></div>`;
  return el;
}

// ── Markdown ──
function renderMd(text){
  if(!text)return'';
  try{marked.setOptions({breaks:true,gfm:true,highlight:(c,l)=>{if(l&&hljs.getLanguage(l)){try{return hljs.highlight(c,{language:l}).value}catch(e){}}return c}});return marked.parse(text)}
  catch(e){return esc(text)}
}

// ── Send ──
async function sendMessage(){
  const inp=document.getElementById('input');
  const text=inp.value.trim();if(!text||!activeSessionId)return;
  inp.value='';autoResize(inp);addUserMsg(text);
  try{await api(`/sessions/${activeSessionId}/message`,{method:'POST',body:JSON.stringify({message:text})});if(sessions[activeSessionId])sessions[activeSessionId].status='running';refreshSessions()}
  catch(e){addErrorMsg('Send failed: '+e.message)}
}

// ── Create / Destroy ──
function showNewModal(){document.getElementById('new-modal').classList.add('show');if(isMobile)closeSidebar()}
function hideNewModal(){document.getElementById('new-modal').classList.remove('show')}

async function createSession(){
  const name=document.getElementById('m-name').value.trim();
  const project=document.getElementById('m-project').value.trim();
  const model=document.getElementById('m-model').value.trim();
  const initial=document.getElementById('m-initial').value.trim();
  const soul=document.getElementById('m-soul').checked;
  hideNewModal();
  try{
    const s=await api('/sessions',{method:'POST',body:JSON.stringify({name:name||undefined,project:project||undefined,model:model||undefined,initial_message:initial||undefined,soul_files:soul})});
    if(s.error){addErrorMsg(s.error);return}
    await refreshSessions();selectSession(s.id);
  }catch(e){alert('Failed: '+e.message)}
  ['m-name','m-project','m-model','m-initial'].forEach(id=>document.getElementById(id).value='');
}

async function destroySession(id){
  if(!confirm('Destroy session?'))return;
  try{await api(`/sessions/${id}`,{method:'DELETE'});if(activeSessionId===id)selectSession(null);await refreshSessions()}catch(e){alert(e.message)}
}

// ── Keyboard ──
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideNewModal()});
document.getElementById('input').addEventListener('keydown',e=>{
  // Mobile: Enter sends. Desktop: Shift+Enter sends.
  if(e.key==='Enter'){
    if(isMobile&&!e.shiftKey){e.preventDefault();sendMessage()}
    else if(!isMobile&&e.shiftKey){e.preventDefault();sendMessage()}
  }
});
document.getElementById('input').addEventListener('input',function(){autoResize(this)});
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,160)+'px'}

// ── Helpers ──
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function shortId(id){return(id||'').slice(0,8)}
function timeStr(){return new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function scrollBottom(){const c=document.getElementById('content');c.scrollTop=c.scrollHeight}
function copyText(btn){const md=btn.closest('.body').querySelector('.md');navigator.clipboard.writeText(md.innerText).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500)})}

// ── History ──
let historyData=[];
async function loadHistory(){try{historyData=await api('/history?limit=50');renderHistory('')}catch(e){}}
function renderHistory(query){
  const listEl=document.getElementById('history-list');listEl.innerHTML='';
  const words=(query||'').toLowerCase().trim().split(/\s+/).filter(Boolean);
  let filtered=historyData;
  if(words.length)filtered=historyData.filter(s=>{const h=[s.id,s.name,s.title,s.project,s.model,s.first_msg,s.summary].join(' ').toLowerCase();return words.every(w=>h.includes(w))});
  if(!filtered.length){listEl.innerHTML='<div class="empty-state" style="padding:12px">No matches</div>';return}
  filtered.forEach(s=>{
    const el=document.createElement('div');el.className='history-item';
    const d=s.title||s.name||s.first_msg||shortId(s.id);
    const model=(s.model||'').replace(/^claude-/,'');
    el.innerHTML=`<div class="hi-title" title="${esc(d)}">${esc(d)}</div><div class="hi-meta"><span>${esc(shortId(s.id))}</span><span>${relTime(s.mod_time)}</span><span>${s.messages||'?'}msg</span>${model?'<span>'+esc(model)+'</span>':''}</div>${s.summary?'<div class="hi-summary">'+esc(s.summary)+'</div>':''}`;
    el.onclick=()=>{resumeSession(s.id,d);if(isMobile)closeSidebar()};
    listEl.appendChild(el);
  });
}

async function resumeSession(sid,displayName){
  if(!confirm('Resume: '+(displayName||shortId(sid))+'?'))return;
  try{
    const s=await api('/sessions/resume',{method:'POST',body:JSON.stringify({session_id:sid})});
    if(s.error){alert(s.error);return}
    await refreshSessions();
    activeSessionId=s.id;
    document.getElementById('welcome').style.display='none';
    const m=document.getElementById('messages');m.style.display='flex';m.innerHTML='';
    document.getElementById('composer').classList.remove('disabled');
    try{
      const h=await api(`/history/${sid}/messages?limit=200`);
      if(h&&h.length){addSystemMsg(`${h.length} messages loaded`);h.forEach(msg=>{
        if(msg.role==='user')addUserMsg(msg.content);
        else if(msg.role==='assistant')addAIMsg(msg.content);
        else if(msg.role==='tool_use')addToolUseMsg(msg.tool_name,msg.tool_input);
        else if(msg.role==='tool_result')addToolResultMsg(msg.content);
      });scrollBottom()}
    }catch(e){}
    connectSSE(s.id);updateSessionChip();refreshSessions();
  }catch(e){alert('Resume failed: '+e.message)}
}

function relTime(iso){if(!iso)return'';const d=Date.now()-new Date(iso).getTime(),m=Math.floor(d/60000);if(m<1)return'now';if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d'}
</script>
</body>
</html>
